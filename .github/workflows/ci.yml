name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: assemble
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U app -d assemble"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/assemble
      DIRECT_URL: postgresql://app:app@localhost:5432/assemble
      AUTH_SECRET: ci-test-secret-min-32-chars-long
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: sh scripts/prisma-env.sh migrate deploy
      - run: npm run seed
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
